<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Meine Karten</title>

<link rel="manifest" href="manifest.json">

<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<meta name="theme-color" content="#0b1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>

html,body{
height:100%;
margin:0;
background:#0b1220;
color:#fff;
font-family:system-ui;
overflow-x:hidden;
overscroll-behavior-x:none;
touch-action:pan-y;
-webkit-overflow-scrolling:touch;
}

.app{
height:100%;
display:flex;
flex-direction:column;
overflow:hidden;
}

.topbar{
position:sticky;
top:0;
display:flex;
align-items:center;
padding:12px;
background:#0b1220;
border-bottom:1px solid rgba(255,255,255,0.1);
z-index:10;
}

.title{
font-weight:700;
}

.spacer{
flex:1;
}

.btn{
background:#1e293b;
border:none;
padding:8px 12px;
border-radius:10px;
color:white;
cursor:pointer;
}

.home{
flex:1;
overflow:auto;
padding:16px;
}

.row{
display:flex;
gap:10px;
}

.search{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
background:#0f172a;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:16px;
}

.card{
background:#0f172a;
border-radius:16px;
padding:16px;
cursor:pointer;
}

.viewer{
position:absolute;
inset:0;
background:black;
display:none;
}

.viewer.active{
display:block;
}

iframe{
width:100%;
height:100%;
border:0;
}

.fabBack{
position:absolute;
top:12px;
left:12px;
background:#0f172a;
padding:10px;
border-radius:12px;
cursor:pointer;
z-index:20;
}

</style>
</head>

<body>

<div class="app">

<div class="topbar">
<div class="title">Meine Karten</div>
<div class="spacer"></div>
<button class="btn" id="btnReload">↻</button>
</div>

<div class="home" id="home">

<div class="row">
<input class="search" id="search" placeholder="Karte suchen"/>
<button class="btn" id="btnOpenLast">Letzte</button>
</div>

<div class="grid" id="grid"></div>

</div>

<div class="viewer" id="viewer">

<div class="fabBack" id="fabBack">←</div>

<iframe id="frame"></iframe>

</div>

</div>

<script>

const grid=document.getElementById("grid")
const viewer=document.getElementById("viewer")
const frame=document.getElementById("frame")
const fabBack=document.getElementById("fabBack")

let maps=[]

async function loadMaps(){

const res=await fetch("maps.json")
maps=await res.json()

grid.innerHTML=maps.map(m=>`
<div class="card" onclick="openMap('${m.id}')">
<b>${m.name}</b>
</div>
`).join("")

}

function openMap(id){

const m=maps.find(x=>x.id===id)

frame.src=m.url

viewer.classList.add("active")

}

fabBack.onclick=()=>{
viewer.classList.remove("active")
frame.src="about:blank"
}

document.getElementById("btnReload").onclick=()=>location.reload()

loadMaps()

</script>

</body>
</html>
