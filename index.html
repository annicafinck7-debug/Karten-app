<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <!-- ✅ viewport-fit=cover = iPhone Safe-Area richtig nutzen -->
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>Meine Karten</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b1220">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root{
      --bg:#0b1220;
      --card:#0f172a;
      --card2:rgba(255,255,255,.06);
      --text:#e5e7eb;
      --muted:#a3adc2;
      --border:rgba(148,163,184,.18);
      --shadow:0 16px 50px rgba(0,0,0,.35);
      --btn:#22c55e;
      --btnText:#052e16;
      --accent:#8b5cf6;

      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
    }

    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--text);
      font:14px/1.35 system-ui,-apple-system,Segoe UI,Roboto,Arial;
      overscroll-behavior: none; /* ✅ verhindert Pull-to-refresh (Chrome/Android) */
      -webkit-tap-highlight-color: transparent;
    }
    *{box-sizing:border-box}
    a{color:inherit}
    button,input{font:inherit}

    /* ✅ iOS: Scroll “appiger” + weniger Safari-Overlay-Gefühl */
    body{
      -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
    }

    /* App Shell */
    .app{
      height:100%;
      display:flex;
      flex-direction:column;
      overflow:hidden; /* ✅ verhindert, dass iOS oben “zieht” */
    }

    /* Topbar */
    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      display:flex;
      align-items:center;
      gap:10px;
      padding: calc(10px + var(--safeTop)) 14px 10px 14px; /* ✅ Safe-Area top */
      background: rgba(11,18,32,.92);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--border);
    }
    .logo{
      width:34px;height:34px;border-radius:12px;
      background:linear-gradient(135deg,var(--accent),rgba(255,255,255,.1));
      box-shadow:var(--shadow);
      flex:0 0 auto;
    }
    .title{display:flex;flex-direction:column;min-width:0}
    .title b{font-size:14px}
    .title span{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .spacer{flex:1}

    .btn{
      height:36px;
      padding:0 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--card2);
      color:var(--text);
      cursor:pointer;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      gap:8px;
      user-select:none;
    }
    .btn.primary{ background:var(--btn); border-color:transparent; color:var(--btnText); }
    .btn:active{transform:translateY(1px)}

    /* Screens container (Home + Viewer) */
    .screens{
      position:relative;
      flex:1;
      overflow:hidden;
    }

    /* HOME */
    .home{
      position:absolute;
      inset:0;
      overflow:auto;
      padding: 14px 14px calc(14px + var(--safeBottom)) 14px; /* ✅ Safe bottom */
      display:flex;
      flex-direction:column;
      gap:12px;
      max-width:1100px;
      width:100%;
      margin:0 auto;
      transform: translateX(0);
      transition: transform .25s ease, opacity .25s ease;
    }
    .home.hidden{
      transform: translateX(-8%);
      opacity:0;
      pointer-events:none;
    }

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
    .search{
      flex:1;
      min-width:220px;
      height:42px;
      border-radius:14px;
      border:1px solid var(--border);
      background:var(--card);
      color:var(--text);
      padding:0 12px;
      outline:none;
    }
    .search::placeholder{color:rgba(163,173,194,.7)}

    .hint{color:var(--muted); font-size:12px}

    .grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap:12px;
    }
    @media (max-width: 900px){ .grid{grid-template-columns: repeat(2, minmax(0, 1fr));} }
    @media (max-width: 580px){ .grid{grid-template-columns: 1fr;} }

    .card{
      border:1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border-radius:18px;
      padding:14px;
      box-shadow:var(--shadow);
      cursor:pointer;
      transition: transform .10s ease;
      user-select:none;
      display:flex;
      flex-direction:column;
      gap:8px;
      min-height:128px;
    }
    .card:active{transform:translateY(1px)}
    .card .name{font-weight:1000; font-size:15px}
    .card .desc{color:var(--muted); font-size:12px; min-height:32px}
    .card .tags{display:flex; gap:6px; flex-wrap:wrap; margin-top:2px;}
    .tag{
      font-size:12px;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      color:var(--text);
      font-weight:900;
      white-space:nowrap;
    }

    /* VIEWER */
    .viewer{
      position:absolute;
      inset:0;
      background:#000;
      transform: translateX(105%);
      transition: transform .25s ease;
      will-change: transform;
    }
    .viewer.active{
      transform: translateX(0);
    }

    iframe{
      border:0;
      width:100%;
      height:100%;
      background:#111;
    }

    /* Top overlay bar */
    .viewerBar{
      position:absolute;
      left:12px; right:12px;
      top: calc(12px + var(--safeTop));
      z-index:30;
      display:flex; align-items:center; gap:10px;
      background:rgba(11,18,32,.72);
      border:1px solid var(--border);
      border-radius:16px;
      padding:10px 10px;
      backdrop-filter: blur(10px);
      transition:opacity .25s ease, transform .25s ease;
    }
    .viewerBar.hidden{
      opacity:0;
      transform:translateY(-10px);
      pointer-events:none;
    }
    .viewerTitle{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
      flex:1;
    }
    .viewerTitle b{font-size:13px}
    .viewerTitle span{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    /* Mini back (always) */
    .fabBack{
      position:absolute;
      left:12px;
      top: calc(12px + var(--safeTop));
      z-index:35;
      width:44px;
      height:44px;
      border-radius:16px;
      border:1px solid var(--border);
      background:rgba(11,18,32,.72);
      backdrop-filter: blur(10px);
      box-shadow:var(--shadow);
      display:none;
      align-items:center;
      justify-content:center;
      font-weight:1000;
      cursor:pointer;
      user-select:none;
    }
    .fabBack.show{display:flex;}

    /* Tap-zone to show bar */
    .topTapZone{
      position:absolute;
      left:0; right:0;
      top:0;
      height: 78px;
      z-index:25;
      background:transparent;
    }

    /* ✅ Loader (wie App) */
    .loader{
      position:absolute;
      left:12px; right:12px;
      top: calc(64px + var(--safeTop));
      height:3px;
      border-radius:999px;
      background: rgba(255,255,255,.10);
      overflow:hidden;
      z-index:40;
      opacity:0;
      transform: translateY(-6px);
      transition: opacity .2s ease, transform .2s ease;
      pointer-events:none;
    }
    .loader.show{
      opacity:1;
      transform: translateY(0);
    }
    .loader > i{
      display:block;
      height:100%;
      width:40%;
      background: linear-gradient(90deg, rgba(139,92,246,.2), rgba(34,197,94,.9), rgba(139,92,246,.2));
      animation: loadMove .9s infinite ease-in-out;
      border-radius:999px;
    }
    @keyframes loadMove{
      0%{ transform: translateX(-120%); }
      100%{ transform: translateX(320%); }
    }

    .toast{
      position:fixed;
      left:50%;
      bottom: calc(16px + var(--safeBottom));
      transform:translateX(-50%);
      background:rgba(15,23,42,.92);
      border:1px solid var(--border);
      color:var(--text);
      padding:10px 12px;
      border-radius:14px;
      box-shadow:var(--shadow);
      display:none;
      z-index:9999;
      max-width:min(520px, 92vw);
      font-size:13px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="logo" aria-hidden="true"></div>
      <div class="title">
        <b>Meine Karten</b>
        <span id="subTitle">Auswahl</span>
      </div>
      <div class="spacer"></div>
      <button class="btn" id="btnReload" title="Aktualisieren">↻</button>
    </div>

    <div class="screens">
      <!-- HOME -->
      <main class="home" id="home">
        <div class="row">
          <input class="search" id="search" placeholder="Karte suchen (Name / Tags) …" />
          <button class="btn primary" id="btnOpenLast" title="Letzte Karte öffnen">▶ Letzte</button>
        </div>
        <div class="hint">
          Tipp: Wenn du’s schon installiert hast, ignorier Browser-Buttons – die App läuft standalone sauber.
        </div>
        <section class="grid" id="grid"></section>
      </main>

      <!-- VIEWER -->
      <section class="viewer" id="viewer" aria-hidden="true">
        <div class="topTapZone" id="topTapZone" title="Tippen: Leiste anzeigen"></div>

        <div class="fabBack" id="fabBack" title="Zurück">←</div>

        <div class="viewerBar hidden" id="viewerBar">
          <button class="btn" id="btnBack" title="Zurück">←</button>
          <div class="viewerTitle">
            <b id="viewerName">—</b>
            <span id="viewerUrl">—</span>
          </div>
          <button class="btn" id="btnOpenNew" title="In neuem Tab öffnen">↗</button>
        </div>

        <div class="loader" id="loader"><i></i></div>

        <iframe id="frame" title="Karten-Viewer" referrerpolicy="no-referrer"></iframe>
      </section>
    </div>

    <div class="toast" id="toast"></div>
  </div>

<script>
  const LS_LAST = "mapsHub_last";

  const els = {
    subTitle: document.getElementById("subTitle"),
    home: document.getElementById("home"),
    viewer: document.getElementById("viewer"),
    grid: document.getElementById("grid"),
    search: document.getElementById("search"),
    btnBack: document.getElementById("btnBack"),
    btnOpenNew: document.getElementById("btnOpenNew"),
    btnReload: document.getElementById("btnReload"),
    btnOpenLast: document.getElementById("btnOpenLast"),
    frame: document.getElementById("frame"),
    viewerName: document.getElementById("viewerName"),
    viewerUrl: document.getElementById("viewerUrl"),
    toast: document.getElementById("toast"),
    viewerBar: document.getElementById("viewerBar"),
    fabBack: document.getElementById("fabBack"),
    topTapZone: document.getElementById("topTapZone"),
    loader: document.getElementById("loader"),
  };

  let maps = [];
  let current = null;

  function toast(msg){
    els.toast.textContent = msg;
    els.toast.style.display = "block";
    clearTimeout(toast._t);
    toast._t = setTimeout(()=>els.toast.style.display="none", 2400);
  }

  function saveLS(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
  function loadLS(k,fb){ try{ const s = localStorage.getItem(k); return s ? JSON.parse(s) : fb; }catch(e){ return fb; } }

  function esc(s){
    return String(s??"").replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m]));
  }

  function normalize(str){
    return String(str||"").toLowerCase()
      .replace(/\s+/g," ")
      .replace(/[.,;:_/\\|()\-–—]/g,"")
      .trim();
  }

  function render(){
    const q = normalize(els.search.value);
    const list = maps.filter(m=>{
      if(!q) return true;
      const hay = normalize([m.name, m.desc, (m.tags||[]).join(" ")].join(" "));
      return hay.includes(q);
    });

    els.grid.innerHTML = list.map(m=>`
      <article class="card" data-id="${esc(m.id)}" tabindex="0" role="button" aria-label="${esc(m.name)} öffnen">
        <div class="name">${esc(m.name)}</div>
        <div class="desc">${esc(m.desc || "")}</div>
        <div class="tags">
          ${(m.tags||[]).slice(0,6).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}
        </div>
      </article>
    `).join("");

    els.grid.querySelectorAll(".card").forEach(card=>{
      const open = ()=>openMap(card.dataset.id);
      card.addEventListener("click", open);
      card.addEventListener("keydown", (e)=>{
        if(e.key==="Enter" || e.key===" "){
          e.preventDefault();
          open();
        }
      });
    });
  }

  function setMode(mode){
    const viewing = mode === "viewer";
    els.home.classList.toggle("hidden", viewing);
    els.viewer.classList.toggle("active", viewing);
    els.viewer.setAttribute("aria-hidden", viewing ? "false" : "true");
    els.subTitle.textContent = viewing ? "Karte geöffnet" : "Auswahl";
  }

  // ✅ Auto-hide controls
  let hideTimer = null;

  function showControls(){
    els.viewerBar.classList.remove("hidden");
    els.fabBack.classList.remove("show");
    clearTimeout(hideTimer);
    hideTimer = setTimeout(hideControls, 1800);
  }

  function hideControls(){
    els.viewerBar.classList.add("hidden");
    els.fabBack.classList.add("show");
  }

  function showLoader(on){
    els.loader.classList.toggle("show", !!on);
  }

  function openMap(id){
    const m = maps.find(x=>x.id===id);
    if(!m){ toast("Karte nicht gefunden"); return; }

    current = m;
    saveLS(LS_LAST, {id:m.id, ts: Date.now()});

    els.viewerName.textContent = m.name;
    els.viewerUrl.textContent = m.url;

    // Loader an, src setzen
    showLoader(true);
    els.frame.src = m.url;

    setMode("viewer");
    history.pushState({view:"viewer", id:m.id}, "", "#"+encodeURIComponent(m.id));

    showControls();
  }

  function closeViewer(){
    current = null;
    showLoader(false);
    els.frame.src = "about:blank";
    setMode("home");
    history.pushState({view:"home"}, "", "#");
  }

  async function loadMaps(){
    const res = await fetch("maps.json", {cache:"no-store"});
    maps = await res.json();
    render();
  }

  // Buttons
  els.btnBack.addEventListener("click", closeViewer);
  els.fabBack.addEventListener("click", closeViewer);
  els.btnReload.addEventListener("click", ()=>location.reload());
  els.btnOpenNew.addEventListener("click", ()=>{
    if(current?.url) window.open(current.url, "_blank", "noopener,noreferrer");
  });

  // Show bar on tap
  els.topTapZone.addEventListener("click", showControls);
  els.viewer.addEventListener("pointerdown", (e)=>{
    const y = e.clientY || 0;
    if(y < 110) showControls();
  });

  // iframe load -> loader aus
  els.frame.addEventListener("load", ()=>{
    showLoader(false);
  });

  els.btnOpenLast.addEventListener("click", ()=>{
    const last = loadLS(LS_LAST, null);
    if(last?.id){ openMap(last.id); }
    else toast("Noch keine Karte geöffnet.");
  });

  els.search.addEventListener("input", render);

  window.addEventListener("popstate", ()=>{
    if(location.hash && location.hash.length > 1){
      const id = decodeURIComponent(location.hash.slice(1));
      openMap(id);
    }else{
      setMode("home");
    }
  });

  // ✅ Edge-swipe zurück (links wischen wie iPhone)
  let swipe = {active:false, x0:0, y0:0};
  els.viewer.addEventListener("touchstart", (e)=>{
    if(!els.viewer.classList.contains("active")) return;
    const t = e.touches?.[0];
    if(!t) return;
    // nur wenn am linken Rand gestartet (Edge gesture)
    if(t.clientX > 24) return;
    swipe = {active:true, x0:t.clientX, y0:t.clientY};
  }, {passive:true});

  els.viewer.addEventListener("touchmove", (e)=>{
    if(!swipe.active) return;
    const t = e.touches?.[0];
    if(!t) return;
    const dx = t.clientX - swipe.x0;
    const dy = Math.abs(t.clientY - swipe.y0);
    // horizontal deutlich stärker als vertikal
    if(dx > 70 && dy < 50){
      swipe.active = false;
      closeViewer();
    }
  }, {passive:true});

  els.viewer.addEventListener("touchend", ()=>{ swipe.active=false; }, {passive:true});

  (async ()=>{
    await loadMaps();

    if(location.hash && location.hash.length > 1){
      const id = decodeURIComponent(location.hash.slice(1));
      openMap(id);
    } else {
      setMode("home");
    }

    if("serviceWorker" in navigator){
      navigator.serviceWorker.register("./sw.js").catch(()=>{});
    }
  })();
</script>
</body>
</html>
